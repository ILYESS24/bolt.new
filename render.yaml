services:
  - type: web
    name: boltai
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: boltai
          property: host
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: boltai-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: boltai-db
    plan: free